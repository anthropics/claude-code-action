name: CI

on:
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: classpass/setup-bun@main
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: classpass/setup-bun@main
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run prettier check
        run: bun run format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: classpass/setup-bun@main
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install

      - name: Run TypeScript type check
        run: bun run typecheck
