name: CI

on:
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Bun manually
        run: |
          echo "Installing Bun..."
          # 1. Ensure the script has execution permissions on the runner
          chmod +x .github/workflows/scripts/bun-install.sh
        
          # 2. Run the script and pass your specific version target
          ./.github/workflows/scripts/bun-install.sh -s "bun-v1.2.12"

          echo "Bun installed at: $HOME/.bun/bin/bun"

          # Verify Bun installation
          if [ -f "$HOME/.bun/bin/bun" ]; then
            echo "✅ Bun executable found"
            $HOME/.bun/bin/bun --version
            # Append the directory to GITHUB_PATH
            echo "$HOME/.bun/bin" >> $GITHUB_PATH
          else
            echo "❌ Bun executable not found"
            exit 1
          fi

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Bun manually
        run: |
          echo "Installing Bun..."
          # 1. Ensure the script has execution permissions on the runner
          chmod +x .github/workflows/scripts/bun-install.sh
        
          # 2. Run the script and pass your specific version target
          ./.github/workflows/scripts/bun-install.sh

          echo "Bun installed at: $HOME/.bun/bin/bun"

          # Verify Bun installation
          if [ -f "$HOME/.bun/bin/bun" ]; then
            echo "✅ Bun executable found"
            $HOME/.bun/bin/bun --version
            # Append the directory to GITHUB_PATH
            echo "$HOME/.bun/bin" >> $GITHUB_PATH
          else
            echo "❌ Bun executable not found"
            exit 1
          fi

      - name: Install dependencies
        run: bun install

      - name: Run prettier check
        run: bun run format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Bun manually
        run: |
          echo "Installing Bun..."
          # 1. Ensure the script has execution permissions on the runner
          chmod +x .github/workflows/scripts/bun-install.sh
        
          # 2. Run the script and pass your specific version target
          ./.github/workflows/scripts/bun-install.sh -s "bun-v1.2.12"

          echo "Bun installed at: $HOME/.bun/bin/bun"

          # Verify Bun installation
          if [ -f "$HOME/.bun/bin/bun" ]; then
            echo "✅ Bun executable found"
            $HOME/.bun/bin/bun --version
            # Append the directory to GITHUB_PATH
            echo "$HOME/.bun/bin" >> $GITHUB_PATH
          else
            echo "❌ Bun executable not found"
            exit 1
          fi

      - name: Install dependencies
        run: bun install

      - name: Run TypeScript type check
        run: bun run typecheck
